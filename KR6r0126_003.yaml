body:
  text: 翻經三藏沙門義淨撰十九受戒軌則二十洗浴隨時二十一坐具襯身二十二臥息方法二十三經行少病二十四禮不相扶二十五師資之道二十六客舊相遇二十七先體病源二十八進藥方法二十九除其弊藥三十旋右觀時十九受戒軌則西國出家軌儀咸悉具有聖制廣如百一羯磨此但略指方隅諸有發心欲出家者隨情所樂到一師邊陳其本意師乃方便問其難事謂非害父母等難事既無許言攝受既攝受已或經旬月令其解息師乃為授五種學處名塢波索迦自此之前非七衆數此是創入佛法之基也師次為辦縵條僧腳崎及下裙等并鉢濾羅方為白僧陳出家事僧衆許已為請阿遮利耶可於屏處令剃頭人為除鬚髮方適寒溫教其洗浴師乃為著下裙方便撿察非黃門等次與上衣令頂戴受著法衣已授與鉢器是名出家次於本師前阿遮利耶授十學處或時暗誦或可讀文既受戒已名室羅末尼羅譯為求寂言欲求趣涅槃圓寂之處舊云沙彌者言略而音訛翻作息慈意準而無據也威儀節度請教白事與進具者體無二準但於律藏十二無犯其正學女片有差降十二者何一不分別衣二離衣宿三觸火四足食五害生種六青草上棄不淨七輒上高樹八觸寶九食殘宿食十壞地十一不受食十二損生苗斯之十二兩小非過其正學女後五便犯此下三衆咸制安居其六法六隨法如餘處説能如是者方成應法是五衆收堪銷物利豈有既出家後師主不授十戒恐其毀破大戒不成此則妄負求寂之名虛抱出家之稱以懷片利寧知大損經云雖未受十戒墮僧數者乃是權開一席豈得執作長時又神州出家皆由公度既蒙落髮遂乃權依一師師主本不問其一遮弟子亦何曾請其十戒未進具來恣情造罪至受具日令入道場律儀曾不預教臨時詎肯調順住持之道固不然矣既不合銷常住受施負債何疑理應依教而為濟脫凡蒙公度者皆須預請一師師乃先問難事若清淨者為受五戒後觀落髮授縵條衣令受十戒法式既間年歲又滿欲受具戒師乃觀其志意能奉持者即可為辦六物并為請餘九人或入小壇或居大界或自然界俱得秉法然壇場之內或用衆家褥席或可人人自將坐物略辦香花不在營費其受戒者教令三遍一一禮僧或時近前兩手執足此二皆是聖教禮敬之儀亦既禮已教其乞戒既三乞已本師對衆為受衣鉢其鉢須持以巡行普呈大衆如合樣者大衆人人咸云好鉢如不言者招越法罪然後依法為受其羯磨師執文而讀或時暗誦俱是聖教既受戒已名塢波三鉢那塢波是近三鉢那是圓謂涅槃也今受大戒即是親近涅槃舊云具足者言其泛意然羯磨亦竟急須量影記五時之別其量影法預取一木條如細箸許可長一肘折其一頭四指令竪如曲尺形勿使相離竪箸日中餘杖布地令其竪影與臥杖相當方以四指量其臥影滿一四指名一布路沙乃至多布路沙或一布路沙餘一指半指或但有一指等如是加減可以意測言布路沙者譯為人也所以四指之影名一人者即是四指竪杖影長四指之時此人立在日中影量與身量相似其八指遂與身量兩影相似斯據中人未必皆爾自餘長短義可準之然須道其食前食後若天陰及夜即須準酌而言之若依神州法者或可竪尺日中量影長短或復記其十二辰數言五時者既而方域異儀月數離合自非指事難以委知一謂冬時有四月從九月十六日至正月十五日二謂春時亦有四月從正月十六日至五月十五日三謂雨時但有一月從五月十六日至六月十五日四謂終時唯一日一夜謂六月十六日晝夜五是長時從六月十七日至九月十五日此乃獨於律教中佛制如是次第明有密意也若依方俗或作三時四時六時如餘處説凡西方南海出家之人創相見者問云大德幾夏答云爾許若同夏者問在何時若時同者問得幾日若日同者問食前後同在食前方問其影影若有殊大小成異影若同者便無大小坐次則據其先至知事乃任彼前差向西方者必須間此不同支那記其月日而已然那爛陀寺多是長時明相才出受其近圓意取同夏之中多為最大即當神州六月十七日明相才出由不得後夏故此據西方坐夏之法若如神州舊行即當五月十七日也若六月十六日夜將盡而受戒者則同夏之中最小由其得後夏故既受戒已不待嚫施若其師有為辦少多或持腰絛或濾水羅等奉臨壇者以表不空之心次即本師為指戒本令識罪相方教誦戒既其熟已誦大律藏日日誦過旦旦試之不恆受持恐損心力誦律藏了方學經論此是西方師資途轍雖復去聖懸遠然而此法未虧為此二師喻之父母豈有欲受之時非常勞倦亦既得已戒不關懷有始無終可惜之甚自有一會求受受已不重參師不誦戒經不披律典虛霑法伍自損損他若此之流成滅法者然西方行法受近圓已去名鐸曷攞譯為小師滿十夏名悉他薜攞譯為住位得離依止而住又得為塢波馱耶凡有書疏往還題云求寂某乙小苾芻某乙住位苾芻某乙若學通內外德行高著者便云多聞苾芻某乙不可云僧某乙僧是僧伽目乎大衆寧容一己輒道四人西方無此法也凡為親教師者要須住位滿足十夏秉羯磨師及屏教者并餘證人並無定年幾事須解律清淨中邊數滿律云非塢波馱耶而喚為塢波馱耶非阿遮利耶喚為阿遮利耶或翻此二及親斥塢波馱耶名者皆得惡作之罪若有人問云爾親教師其名何也或問汝誰弟子或可自有事至須説師名者皆應言我因事至説塢波馱耶名塢波馱耶名某甲西國南海稱我不是慢詞設令道汝亦非輕稱但欲別其彼此全無倨傲之心不並神州將為鄙惡若其嫌者改我為今斯乃咸是聖教宜可行之不得雷同無分皂白云爾凡諸白衣詣苾芻所若專誦佛典情希落髮畢願緇衣號為童子或求外典無心出離名曰學生斯之二流並須自食西國僧寺多有學生來就苾芻習學外典一得驅馳給侍二乃教發好心既有自利利他畜之非損必是杜多一鉢理則不勞若也片有供承亦成是要遣給齒木令其授食足應時須不傷悲道也若餐常住聖教全遮必其於衆有勞準功亦合餐食或是普通之食或可施主先心雖復噉食故成無罪夫龍河影沒鷲嶺光收傳法羅漢能餘幾在故論云大師眼閉證者隨亡煩惱增時應勤莫逸理當諸德共作護持若委隨而縱慢心欲遣人天何所歸向律云有秉羯磨我法未滅若不秉時我法便盡又云戒住我住理非虛説既有深旨誠可敬歟重曰大師影謝法將隨亡邪山峻峙慧巘隤綱重明佛日實委賢良若遵小徑誰弘大方幸惟通哲勉力宣揚冀紹隆之無替傳永劫而彌芳彌芳伊何戒海揚波此則教將滅而不滅行欲訛而不訛符正説於王舍事無虧於逝多二十洗浴隨時夫論洗浴之法西國乃與東夏不同但以時節調和稍異餘處於十二月花果恆有不識氷雪薄有微霜雖復多暑亦非苦熱熱則身無痱子寒乃足無皴裂為此人多洗沐體尚清淨每於日日之中不洗不食又復所在之處極饒池水時人皆以穿池為福若行一驛則望見三二十所或寬一畝五畝於其四邊種多羅樹高四五十尺池乃皆承雨水湛若清江八制底處皆有世尊洗浴之池其水清美異於餘者那爛陀寺有十餘所大池每至晨時寺嗚健稚令僧徒洗浴人皆自持浴裙或千或百俱出寺外散向諸池各為澡浴其浴裙法以疊布長五肘闊肘半繞身使匝抽出舊裙回兩頭令向前取左邊上角以右手牽向腰下令使近身併蹙右邊擪入腰內此謂著浴裙法臥時著裙其法亦爾欲出池時抖擻徐出勿令蟲著上岸法式廣如律辨若不向池寺中洗者著裙同此水遣人澆隨處隨時可為障蔽世尊教為浴室或作露地甎池或作去病藥湯或令油遍塗體夜夜油恆揩足朝朝頭上塗油明目去風深為利益皆有聖教不遑具述廣如律也又洗浴者並須飢時浴已方食有其二益一則身體清虛無諸垢穢二則痰癊消散能餐飲食飽方洗浴醫明所諱故知飢沐飽浴之言未是通方之論若著三尺浴衣褊小形露或元不著赤體而浴者深乖教理也應用四幅洗裙遮身可愛非直奉遵聖教亦乃不愧人神餘之可不智者當悉夜浴尚不改容對人寧無掩蔽耳二十一坐具襯身禮拜敷其坐具五天所不見行致敬起為三禮四部罔窺其事凡為禮者拜敷法式如別章所陳其坐具法割截為之必須復作制令安葉度量不暇詳悉其所須者但擬眠臥之時護他氈席若用他物新故並須安替如其己物故則不須勿令污染虧損信施非為禮拜南海諸僧人持一布巾長三五尺疊若食巾禮拜用替膝頭行時搭在肩上西國苾芻來見咸皆莞爾而笑也二十二臥息方法西國房迮居人復多臥起之後床皆舉攝或內置一邊或移安戶外床闊二肘長四肘半褥席同然輕而不重然後牛糞乾揩其地令使清淨安置坐床及木枮小席等隨尊卑而坐如常作業所有資生之具並棚上安之其床前並無以衣遮障之法其不合者自不合臥如其合者何事遮身其衆僧臥具必須安襯方合受用坐具意在於此如其不爾還招黑背之辜聖有誠言不可不慎又復南海十島西國五天並皆不用木枕支頭神州獨有斯事其西方枕囊樣式其類相似取帛或布染色隨情縫為直袋長一肘半寬半肘中間貯者隨處所出或可填毛或盛麻縕或蒲黃柳絮或木綿荻苕或軟葉乾苔或決明麻豆隨時冷熱量意高下斯乃取適安身實無堅強之患然為木枕踈鞕項下通風致使時人多苦頭疾然則方殊土別所玩不同聊述異聞行否隨好既而暖物除風麻豆明目且能有益用成無爽又為寒鄉凍頂多得傷寒冬月鼻流斯其過也適時溫頂便無此患諺云凍頂溫足未必常可依之矣又復僧房之內有安尊像或於窗上或故作龕食坐之時像前以布幔遮障朝朝洗沐每薦香花午午虔恭隨餐奉獻經箱格在一邊臥時方居別室南海諸洲法亦同此斯乃私房尋常禮敬之軌其寺家尊像並悉別有堂殿豈有像成已後終身更不洗拭自非齋次寧容輒設踈餐由此言之同居亦復何損大師在日尚許同居形像倣真理當無妨西國相傳其來久矣二十三經行少病五天之地道俗多作經行直去直來唯遵一路隨時適性勿居鬧處一則痊痾二能銷食禺中日昳即行時也或可出寺長引或於廊下徐行若不為之身多病苦遂令腳腫肚腫臂疼髆疼但有痰癊不銷並是端居所致必若能行此事實可資身長道故鷲山覺樹之下鹿苑王城之內及餘聖迹皆有世尊經行之基耳闊可二肘長十四五肘高二肘餘壘甎作之上乃石灰塑作蓮花開勢高可二肘闊才一尺有十四五表聖足迹兩頭基上安小制底量與人齊或可內設尊容為釋迦立像若其右繞佛殿旋遊制底別為生福本欲虔恭經行乃是銷散之儀意在養身療病舊云行道或曰經行則二事總包無分涇渭遂使調適之事久闕東川經云觀樹經行親在金剛座側但見真迹未覩圓基耳二十四禮不相扶禮拜之軌須依教為進具若分影在前即合受小者之拜佛言有二種人合受禮拜一謂如來二大己苾芻斯則金口誠教何勞輒事謙下小者見大緩須申敬唱畔睇而禮之大受小禮自可端拱而云痾𡀔柢近也反是呪願彼令無病義耳如其不道彼此招愆隨立隨坐不改常式既其合受無容反敬斯乃五天僧徒之則也豈有小欲禮大先望大起大受小恭恐小嫌恨為此則匆匆迫迫尊執卑而不聽稽首辛苦辛苦卑求敬而不能至地若不如此云乖禮數嗚呼虧聖教取人情敬受乖儀誠可深察延波既久誰當偃諸二十五師資之道夫教授門徒紹隆之要若不存念則法滅可期事須殷勤無宜網漏律云每於晨旦先嚼齒木次可就師奉其齒木澡豆水巾敷置坐處令安穩已然後禮敬尊儀旋繞佛殿却就師處攝衣一禮更不重起合掌三叩雙膝踞地低頭合掌問云塢波馱耶存念馱字音停夜反既無正體借音言之塢波是其親近波字長喚中有阿字阿馱耶義當教讀言和尚者非也西方泛喚博士皆名烏社斯非典語若依梵本經律之文咸云塢波馱耶譯為親教師北方諸國皆喚和社致令傳譯習彼訛音或問云阿遮利耶存念譯為軌範師是能教弟子法式之義先云阿闍梨訛也我今請白不審塢波馱耶宿夜安不四大平和不動止輕利飲食銷不旦朝之餐可能進不斯則廣略隨時也時師乃量身安不具答其事次於鄰近比房住能禮其大者次讀少許經憶所先受日新月故無虧寸陰待至日小食時量身輕重請白方食何勞未曉覓粥匆匆不及白本師無由嚼齒木不暇觀蟲水豈容能洗淨寧知為一盂之粥便違四種佛教訛替之本皆從此來願住持之家善應量處前白事等此乃是阿離耶提舍教授之儀阿離耶譯為聖提捨譯為方即名西國為聖方矣以其賢聖繼軌人皆共稱或云未睇是中提捨是國百億之中心斯其事也此號人咸委之其北方胡國獨喚聖方以為呬度呬音許伊反全非通俗之名但是方言固無別義西國若聞此名多皆不識宜喚西國為聖方斯誠允當或有傳云印度譯之為月雖有斯理未是通稱且如西國名大唐為支那者直是其名更無別義又復須知五天之地皆曰婆羅門國北方速利總號胡強不得雷同咸為一喚耳凡剃髮披縵條出家近圓已律云唯除五事不白自外一一皆須白師不白得罪五事者一嚼齒木二飲水三大便四小便五界中四十九尋內制底畔睇且如欲食白者須就師邊依禮拜法而白師云塢波馱耶存念我今請白洗手洗器欲為食事師云謹慎諸餘白事類此應知師乃量事度時與其進止知有多事便可一時併白若其解律五夏得離本師人間遊行進求餘業到處還須依止十夏既滿依止方休大聖殷勤意在於此如不解律依他盡形設無大者依小而住唯除禮拜餘並為之豈得晨朝問安曾不依律隨有事至寧知白言或有旦暮兩時請其教誡雖復權申訓誨律文意不如是何則白者不的其事答者何所商量白事之言故不然也但為因循日久逐省誰肯勞煩必能準教奉行即是住持不絶若將此以為輕者餘更何成重哉故律文云寧作屠兒不授他具戒捨而不教也又西國相承事師之禮初夜後夜到其師所師乃先遣弟子安坐三藏之中隨時教授若事若理不令空過察其戒行勿使虧違知有所犯即令治懺弟子方乃為師按摩身體襞疊衣裳或時掃拭房庭觀蟲進水片有所作咸皆代為斯則敬上之禮也若門徒有病即皆躬自抱持湯藥所須憂同赤子然佛法綱紀以教誨為首如輪王長子攝養不輕律有明言寧容致慢上言制底畔睇者或云制底畔彈那大師世尊既涅槃後人天並集以火焚之衆聚香柴遂成大𧂐即名此處以為質底是積聚義據從生理遂有制底之名又釋一想世尊衆德俱聚於此二乃積甎土而成之詳傳字義如是或名窣覩波義亦同此舊總云塔別道支提斯皆訛矣或可俱是衆共了名不論其義西方釋名略有二種一有義名二無義名有義名者立名有由即依名義而釋也名體一向相稱如釋善入之名者初依德迹即是依義立名次云或共了知即是不論其義但據世人共喚為善入即是無義之名畔睇者敬禮也凡欲出外禮拜尊像有人問云何所之適答曰我向某處制底畔睇凡禮拜者意在敬上自卑之義也欲致敬時及有請白先整法衣搭左肩上擪衣左腋令使著身即將左手向下掩攝衣之左畔右手隨所掩之衣裾既至下邊卷衣向膝兩膝俱掩勿令身現背後衣緣急使近身掩攝衣裳莫遣垂地足跟雙竪脊項平直十指布地方始叩頭然其膝下逈無衣物復還合掌復還叩頭殷勤致敬如是至三必也尋常一禮便罷中間更無起義西國見為三拜人皆怪之若恐額上有塵先須摩手令淨然後拭之次當拂去兩膝頭土整頓衣裳在一邊坐或可暫時佇立尊者即宜賜坐必有呵責立亦無傷斯乃佛在世時迄乎末代師弟相傳于今不絶如經律云來至佛所禮佛雙足在一邊坐不云敷坐具禮三拜在一邊立斯其教矣但尊老之處多座須安必有人來準儀而坐凡是坐者皆足踏地曾無帖膝之法也律云應先嗢屈竹迦譯為蹲踞雙足履地兩膝皆竪攝斂衣服勿令垂地即是持衣説淨常途軌式或對別人而説罪或向大衆而申敬或被責而請忍或受具而禮僧皆同斯也或可雙膝著地平身合掌乃是香臺瞻仰讚歎之容矣然於床上禮拜諸國所無或敷氈席亦不見有欲敬反慢豈成道理至如床上席上平懷尚不致恭況禮尊師大師此事若為安可西國講堂食堂之內元來不置大床多設木枮并小床子聽講食時用將踞坐斯其本法矣神州則大床方坐其事久之雖可隨時設儀而本末之源須識二十六客舊相遇昔大師在日親為教主客苾芻至自唱善來又復西方寺衆多為制法凡見新來無論客舊及弟子門人舊人即須迎前唱莎揭哆譯曰善來客乃尋聲即云窣莎揭哆譯曰極善來如不説者一違寺制二準律有犯無問大小悉皆如此即為收取瓶鉢挂在壁牙隨處安坐令其憩息幼向屏處尊乃房前卑則敬上而熟搦其腨後及遍身尊乃撫下而頻按其背不至腰足齊年之類事無間然既解疲勞方澡手濯足次就尊所申其禮敬但為一禮跪而按足尊乃展其右手撫彼肩背若別非經久手撫不為師乃問其安不弟子隨事見答然後退在一邊恭敬而坐實無立法然西方軌則多坐小枮復皆露足東夏既無斯事執足之禮不行經説人天來至佛所頂禮雙足退坐一面即其儀矣然後釋其時候供給湯飲酥蜜沙糖飲噉隨意或餘八漿並須羅濾澄清方飲如兼濁滓此定不開杏湯之流體是稠濁準依道理全非飲限律云凡漿淨濾色如黃荻此謂西國師弟門徒客舊相遇逢迎之禮豈有冒寒創至觸熱新來或遍體汗流或手足皆凍放却衣幞急事和南情狀匆忙深乖軌式師乃立之間問餘事誠哉大急將為紹隆言和南者梵云畔睇或云畔憚南譯為敬禮但為採語不真喚和南矣不能移舊且道和南的取正音應云畔睇又道行衆集禮拜非儀合掌低頭口云畔睇故經云或復但合掌乃至小低頭即是致敬也南人不審依希合度向使改不審為畔睇斯乃全同律教矣二十七先體病源前云量身輕重方餐小食者即是觀四大之強弱也若其輕利便可如常所食必有異處則須視其起由既得病源然後將息若覺輕健飢火內然至小食時方始餐噉凡是平旦名痰癊時宿食餘津積在胸膈尚未踈散食便成咎譬乎火焰起而投薪薪乃尋從火化若也火未著而安草草遂存而不然夫小食者是聖別開若粥若飯量身乃食必也因粥能資道即唯此而非餘若其要飯方長身旦食飯而無損凡有食噉令身不安者是與身為病緣也不要頭痛臥床方云是疾若餘藥不療醫人為處須非時食佛言密處與之如異此流固非開限然西方五明論中其醫明曰先當察聲色然後行八醫如不解斯妙求順反成違言八醫者一論所有諸瘡二論針刺首疾三論身患四論鬼瘴五論惡揭陀藥六論童子病七論長年方八論足身力言瘡事兼內外首疾但目在頭齊咽已下名為身患鬼瘴謂是邪魅惡揭陀遍治諸毒童子始從胎內至年十六長年則延身久存足力乃身體強健斯之八術先為八部近日有人略為一夾五天之地咸悉遵修但令解者無不食祿由是西國大貴醫人兼重商客為無殺害自益濟他於此醫明已用功學由非正業遂乃棄之又復須知西方藥味與東夏不同互有互無事非一概且如人參茯苓當歸遠志烏頭附子麻黃細辛若斯之流神州上藥察問西國咸不見有西方則多足訶黎勒北道則時有鬱金香西邊乃阿魏豐饒南海則少出龍腦三種豆䓻皆在杜和羅兩色丁香咸生堀倫國唯斯色類是唐所須自餘藥物不足收採凡四大之身有病生者咸從多食而起或由勞力而發或夜食未泄平旦便餐或旦食不消午時還食因茲發動遂成霍亂厄氣則連宵不息鼓脹即終旬莫止然後乃求多錢之腎氣覓貴價之秦膠富者此事可為貧人命隨朝露病既成矣斯何救焉縱使盧威旦至進丸散而無因鶣鵲昏來遺湯膏而寧濟火燒針刺與木石而不殊振足搖頭僵仆而何別斯乃良由不體病本不解調將可謂止流不塞其源伐樹不除其本枝條彌蔓求絶無因致使學經論者仰三藏而永嘆習靜慮者想八定而長嗟俗士乃務明經之輩則絶轡於金馬之門求進士之流遂息步於石渠之署妨修道業可不大歟廢失榮寵誠非小事聊為敘之勿嫌繁重冀令未損多藥宿痼可除不造醫門而新痾遂殄四大調暢百病不生自利利人豈非益也然而食毒死生蓋是由其往業現緣避就非不須為者哉二十八進藥方法夫四大違和生靈共有八節交競發動無恆凡是痾生即須將息故世尊親説醫方經曰四大不調者一窶嚕二燮跛三畢哆四婆哆初則地大增令身沈重二則水大積涕唾乖常三則火大盛頭胸壯熱四則風大動氣息擊衝即當神州沈重痰癊熱黃氣發之異名也若依俗論病乃有其三種謂風熱癊重則與癊體同不別彰其地大凡候病源旦朝自察若覺四候乖舛即以絶粒為先縱令大渴勿進漿水斯其極禁或一日二日或四朝五朝以差為期義無膠柱若疑腹有宿食叉刺齊胸宜須恣飲熟湯指剔喉中變吐令盡更飲更決以盡為度或飲冷水理亦無傷或乾薑湯斯其妙也其日必須斷食明朝方始進餐如若不能臨時斟酌必其壯熱特諱水澆若沈重戰冷近火為妙其江嶺已南熱瘴之地不可依斯熱發水淋是土宜也如其風急塗以膏油可用布團火炙而尉折傷之處斯亦為善熟油塗之目驗交益若覺痰癊填胸口中唾數鼻流清水氣積咽關戶滿槍喉語聲不轉飲食亡味動歷一旬如此之流絶食便差不勞炙頂無假捩咽斯乃不御湯藥而能蠲疾即醫明之大規矣意者以其宿食若除壯熱便息流津既竭痰癊便瘳內靜氣消即狂風自殄將此調停萬無一失既不勞其診脈詎假問乎陰陽各各自是醫王人人悉成祇域至如鸞法師調氣蠲疾隱默者乃行思禪師坐內抽邪非流俗所識訪名醫於東洛則貧匱絶其津求上藥於西郊則惸獨亡其路所論絶食省而且妙備通窮富豈非要乎又如癰痤暴起熱血忽衝手足煩疼天行時氣或刀箭傷體或墜墮損躬傷寒霍亂之徒半日暴瀉之類頭痛心痛眼疼齒疼片有病起咸須斷食又三等丸能療衆病復非難得取訶黎勒皮乾薑沙糖三事等分搗前二令碎以水片許和沙糖融之併搗為丸旦服十丸許以為度諸無所忌若患痢者不過三兩服即差能破胘氣除風消食為益處廣故此言之若無沙糖者飴蜜亦得又訶黎勒若能每日嚼一顆咽汁亦終身無病此等醫明傳乎帝釋五明一數五天共遵其中要者絶食為最舊人傳云若其七日斷食不差後乃方可求觀世音神州多並不間將為別是齋戒遂不肯行學良由傳者不悟醫道也其有服丹石及長病并腹塊之類或可依斯恐有丹石之人忍飢非所宜也又飛丹則諸國皆無服石則神州獨有然而水精白石有出火者若服之則身體爆裂時人不別抂死者無窮由此言之深須體識蛇蠍等毒全非此療而絶食之時大忌遊行及以作務其長行之人縱令斷食隨路無損如其差已後須將息宜可食新煮飯飲熟菉豆湯投以香和任飲多少若覺有冷投椒薑蓽𦭞若知是風著胡蔥荊芥醫方論曰諸辛悉皆動風唯乾薑非也加之亦佳準絶食日而作調息諱飲冷水餘如藥禁如其噉粥恐痰癊還增必是風勞食亦無損若患熱者即熟煎苦蔘湯飲之為善茗亦佳也自離故國向二十餘年但以此療身頗無他疾且如神州藥石根莖之類數乃四百有餘多並色味精奇香氣芬郁可以蠲疾可以王神針灸之醫診脈之術贍部洲中無以加也長年之藥唯東夏焉良以連岡雪巘接嶺香山異物奇珍咸萃於此故體人像物號曰神州五天之內誰不加尚四海之中孰不欽奉云文殊師利現居其國所到之處若聞是提婆弗呾攞僧莫不大生禮敬提婆是天弗呾攞是子云是支那天子所居處來也考其藥石實為奇妙將息病由頗有疏闕故粗陳大況以備時須若絶食不損者後乃隨方處療苦蔘湯偏除熱病酥油蜜漿特遣風痾其西天羅荼國凡有病者絶食或經半月或經一月要待病可然後方食中天極多七日南海二三日矣斯由風土差互四大不同致令多少不為一概未委神州宜斷食不然而七日不食人命多殞者由其無病持故若病在身多日亦不死矣曾見有病絶粒三旬後時還差則何須見怪絶食日多豈容但見病發不察病起所由壯熱火燃還將熱粥令飲帶病強食深是可畏萬有一差終亦不堪教俗醫方明內極是諱焉又由東夏時人魚菜多並生食此乃西國咸悉不餐凡是菜茹皆須爛煮加阿魏蘇油及諸香和然後方噉𦵔虀之類人皆不食時復憶故噉之遂使齊中結痛損腹腸暗眼目長疾病益虛疏其斯之謂智者思察用行捨藏聞而不行豈醫咎也行則身安道備自他之益俱成捨則體損智微彼我之功皆失也二十九除其弊藥自有方處鄙俗久行病發即服大便小便疾起便用豬糞貓糞或缸盛甕貯號曰龍湯雖加美名穢惡斯極且如蔥蒜許服尚自遣在邊房七日淨身洗浴而進身若未淨不入衆中不合繞塔不應禮拜以其臭穢非病不聽四依陳棄之言即是陳故所棄之藥意在省事僅可資身上價自在開中噉服實成非損梵云晡堤木底鞞殺社晡堤是陳木底是棄鞞殺社譯之為藥即是陳棄藥也律開大便小便乃是犢糞牛尿西國極刑之儔糞塗其體驅擯野外不處人流除糞去穢之徒行便擊杖自異若誤衝著即連衣遍洗大師既緣時御物譏醜先防豈遣服斯而獨乖時望不然之由具如律內用此惠人誠為可鄙勿令流俗習以為常外國若聞誠損風化又復大有香藥何不服之己所不愛寧堪施物然而除蛇蠍毒自有磂黃雄黃雌黃之石片子隨身誠非難得若遭熱瘴即有甘草恆山苦蔘之湯貯畜少多理便易獲薑椒蓽茇旦咽而風冷全祛石蜜沙糖夜餐而飢渴俱息不畜湯藥之直臨事定有闕如違教不行罪愆寧免錢財漫用急處便間若不曲題誰能直悟嗚呼不肯施佳藥遂省用龍湯雖復小利在心寧知大虧聖教正量部中説其陳棄既是部別不可同斯了論雖復見文元非有部所學三十旋右觀時言旋右者梵云鉢喇特崎拏鉢喇字緣乃有多義此中意趣事表旋行特崎拏即是其右總明尊便之目故時人名右手為特崎拏手意是從其右邊為尊為便方合旋繞之儀矣或特欹拏目其施義與此不同如前已述西國五天皆名東方為前方南為右方亦不可依斯以論左右諸經應云旋右三匝若云佛邊行道者非也經云右繞三匝者正順其儀或云繞百千匝不云右者略也然右繞左繞稍難詳定為向右手邊為右繞為向左手邊為左繞耶曾見東夏有學士云右手向內圓之名為右繞左手向內圓之名為左繞理可向其左邊而轉右繞之事方成斯乃出自胸臆非關正理遂令迷俗莫辨司方大德鴻英亦雷同取惑以理商度如何折中但可依其梵本並須杜塞人情向右邊為右繞向左邊為左繞斯為聖制勿致疑惑又復時非時者且如時經所説自應別是會機然四部律文皆以午時為正若影過線許即曰非時若欲護罪取正方者宜須夜揆北辰直望南極定其邪正的辨禺中又宜於要處安小土臺圓闊一尺高五寸中插細杖或時石上竪丁如竹箸許可高四指取其正午之影畫以為記影過畫處便不合食西方在處多悉有之名為薜攞斫羯攞彈舌道之譯為時輪矣揆影之法看其杖影極短之時即正中也然贍部洲中影多不定隨其方處量有參差即如洛州無影與餘不同又如室利佛逝國至八月中以圭測影不縮不盈日中人立並皆無影春中亦爾一年再度日過頭上若日南行則北畔影長二尺三尺日向北邊南影同爾神州則南溟北朔更復不同北戶向日是其恆矣又海東日午關西未中準理既然事難執一是故律云遣取當處日中以為定矣夫出家之人要依聖教口腹之事無日不須揆影而餐理應存念此其落漠餘何護焉是以弘紹之英無怪繁重行海尚持圭去在地寧得逶隨故西國相傳云觀水觀時是曰律師矣又復西國大寺皆有漏水並是積代君王之所奉施并給漏子為衆警時下以銅盆盛水上乃銅碗浮內其碗薄妙可受二升孔在下穿水便上涌細若針許量時準宜碗水既盡沈即打鼓始從平旦一碗沈打鼓一下兩碗兩下三碗三下四碗四下然後吹螺兩聲更別打一下名為一時也即日東隅矣更過四碗同前打四更復鳴螺別打兩下名兩時即正午矣若聞兩打則僧徒不食若見食者寺法即便驅擯過午後兩時法亦同爾夜有四時與晝相似總論一日一夜成八時也若初夜盡時其知事人則於寺上閣鳴鼓以警衆此是那爛陀寺漏法又日將沒時及天曉時皆於門前打鼓一通斯等雜任皆是淨人及戶人所作日沒之後乃至天光大衆全無鳴健稚法凡打健稚不使淨人皆維那自打健稚有四五之別廣如餘處其莫訶菩提及俱尸那寺漏乃稍別從旦至中碗沈十六若南海骨崙國則銅釜盛水穿孔下流水盡之時即便打鼓一盡一打四椎至中齊暮還然夜同斯八總成十六亦是國王所施由斯漏故縱使重雲暗晝長無惑午之辰密雨連宵終罕疑更之夜若能奏請置之深是僧家要事其漏器法然須先取晝夜停時旦至午時八碗沈沒如其減八鑽孔令大調停節數還須巧匠若日夜漸短即可增其半抄若日夜漸長復減其半酌然以消息為度維那若房設小杯準理亦應無過然而東夏五更西方四節調御之教但列三時謂分一夜為三分也初分後分念誦思惟處中一時繫心而睡無病乖此便招違教之愆敬而奉行卒有自他之利矣
